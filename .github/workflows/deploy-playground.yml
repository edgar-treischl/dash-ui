name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 11.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build UI library
        run: pnpm build

      - name: Verify build output
        run: |
          test -f dist/index.js && echo "✓ ESM build exists"
          test -f dist/index.cjs && echo "✓ CommonJS build exists"
          test -f dist/index.d.ts && echo "✓ TypeScript definitions exist"
          test -f dist/index.css && echo "✓ CSS bundle exists"

